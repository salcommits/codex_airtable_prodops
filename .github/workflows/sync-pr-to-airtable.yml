name: Sync PR to Airtable

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Ensure jq is installed
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Sync pull request to Airtable
        env:
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          AIRTABLE_TABLE_ID: tblNAmdvanNvAnjyV
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_STATE: ${{ github.event.pull_request.state }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_UPDATED_AT: ${{ github.event.pull_request.updated_at }}
        run: |
          set -euo pipefail

          if [ -z "${AIRTABLE_TOKEN}" ] || [ -z "${AIRTABLE_BASE_ID}" ]; then
            echo "Missing AIRTABLE_TOKEN or AIRTABLE_BASE_ID secret."
            exit 1
          fi

          URL="https://api.airtable.com/v0/${AIRTABLE_BASE_ID}/${AIRTABLE_TABLE_ID}"

          EXISTING=$(curl --fail-with-body -sS -G "$URL" \
            --data-urlencode "filterByFormula={PR Number}=${PR_NUMBER}" \
            -H "Authorization: Bearer ${AIRTABLE_TOKEN}")

          RECORD_ID=$(echo "$EXISTING" | jq -r '.records[0].id // empty')

          BODY=$(jq -n \
            --argjson pr_number "$PR_NUMBER" \
            --arg title "$PR_TITLE" \
            --arg status "$PR_STATE" \
            --arg branch "$PR_BRANCH" \
            --arg author "$PR_AUTHOR" \
            --arg pr_url "$PR_URL" \
            --arg last_updated "$PR_UPDATED_AT" \
            '{
              fields: {
                "PR Number": $pr_number,
                "Title": $title,
                "Status": $status,
                "Branch": $branch,
                "Author": $author,
                "PR URL": $pr_url,
                "Last Updated": $last_updated
              }
            }')

          if [ -n "$RECORD_ID" ]; then
            echo "Updating Airtable record: $RECORD_ID"
            curl --fail-with-body -sS -X PATCH "$URL/$RECORD_ID" \
              -H "Authorization: Bearer ${AIRTABLE_TOKEN}" \
              -H "Content-Type: application/json" \
              --data "$BODY"
          else
            echo "Creating Airtable record"
            curl --fail-with-body -sS -X POST "$URL" \
              -H "Authorization: Bearer ${AIRTABLE_TOKEN}" \
              -H "Content-Type: application/json" \
              --data "$BODY"
          fi
