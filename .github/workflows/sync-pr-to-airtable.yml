name: Sync PR to Airtable

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Ensure jq is installed
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Sync pull request to Airtable
        env:
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          AIRTABLE_TABLE_ID: tblNAmdvanNvAnjyV
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_STATE: ${{ github.event.pull_request.state }}
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_UPDATED_AT: ${{ github.event.pull_request.updated_at }}
        run: |
          set -euo pipefail

          if [ -z "${AIRTABLE_TOKEN}" ] || [ -z "${AIRTABLE_BASE_ID}" ]; then
            echo "Missing AIRTABLE_TOKEN or AIRTABLE_BASE_ID secret."
            exit 1
          fi

          URL="https://api.airtable.com/v0/${AIRTABLE_BASE_ID}/${AIRTABLE_TABLE_ID}"

          case "$PR_STATE" in
            open) STATUS_VALUE="Open" ;;
            closed) STATUS_VALUE="Closed" ;;
            *) STATUS_VALUE="$PR_STATE" ;;
          esac

          airtable_request() {
            local method="$1"
            local endpoint="$2"
            local data="${3:-}"
            local response
            local code
            local body

            if [ -n "$data" ]; then
              response=$(curl -sS -w '\n%{http_code}' -X "$method" "$endpoint" \
                -H "Authorization: Bearer ${AIRTABLE_TOKEN}" \
                -H "Content-Type: application/json" \
                --data "$data")
            else
              response=$(curl -sS -w '\n%{http_code}' -X "$method" "$endpoint" \
                -H "Authorization: Bearer ${AIRTABLE_TOKEN}")
            fi

            code=$(echo "$response" | tail -n1)
            body=$(echo "$response" | sed '$d')

            if [ "$code" -ge 400 ]; then
              echo "Airtable API error (HTTP $code):" >&2
              echo "$body" >&2
              return 1
            fi

            echo "$body"
          }

          # Pull a page of records and match PR number in jq to avoid formula-related 422s.
          EXISTING=$(airtable_request GET "${URL}?pageSize=100")

          RECORD_ID=$(echo "$EXISTING" | jq -r --arg pr_number "$PR_NUMBER" '
            (.records // [])
            | map(select((.fields["PR Number"] | tostring) == $pr_number))
            | .[0].id // empty
          ')

          BODY=$(jq -n \
            --argjson pr_number "$PR_NUMBER" \
            --arg title "$PR_TITLE" \
            --arg status "$STATUS_VALUE" \
            --arg branch "$PR_BRANCH" \
            --arg author "$PR_AUTHOR" \
            --arg pr_url "$PR_URL" \
            --arg last_updated "$PR_UPDATED_AT" \
            '{
              fields: {
                "PR Number": $pr_number,
                "Title": $title,
                "Status": $status,
                "Branch": $branch,
                "Author": $author,
                "PR URL": $pr_url,
                "Last Updated": $last_updated
              }
            }')

          if [ -n "$RECORD_ID" ]; then
            echo "Updating Airtable record: $RECORD_ID"
            airtable_request PATCH "$URL/$RECORD_ID" "$BODY" | jq -r '.id' >/dev/null
          else
            echo "Creating Airtable record"
            airtable_request POST "$URL" "$BODY" | jq -r '.id' >/dev/null
          fi
